<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Code Mate | Core</title>
    <style>
        :root { --primary: #00f3ff; --bg: #050505; --glass: rgba(10, 15, 30, 0.65); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow-x: hidden; overflow-y: auto; height: 100vh; width: 100vw; 
        }
        
        /* Canvas Background */
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        /* Main Container - Scrollable */
        .container {
            position: relative; z-index: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; min-height: 100vh;
            text-align: center; padding: 40px 20px;
            background: radial-gradient(circle at center, rgba(0, 243, 255, 0.03) 0%, transparent 70%);
        }

        /* HUD Borders - Hidden on mobile */
        .hud-frame {
            position: fixed; top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid rgba(0, 243, 255, 0.15); pointer-events: none; z-index: 2;
        }
        .hud-corner {
            position: absolute; width: 20px; height: 20px; border-color: var(--primary); border-style: solid;
        }
        .tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
        .bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
        .br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        /* Typography */
        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: 4px; margin-bottom: 15px;
            text-shadow: 0 0 15px var(--primary), 0 0 30px rgba(0, 243, 255, 0.4);
            font-family: 'Arial Black', Impact, sans-serif; text-transform: uppercase;
            animation: pulse 4s infinite;
        }
        .slogan {
            font-size: clamp(0.9rem, 3vw, 1.3rem); color: #ccc; letter-spacing: 2px; 
            margin-bottom: 40px; padding: 10px 20px;
            background: rgba(0, 243, 255, 0.05); border-left: 3px solid var(--primary);
            backdrop-filter: blur(5px); max-width: 800px;
        }
        .status-bar { 
            margin-top: 30px; font-size: 0.75rem; color: var(--primary); opacity: 0.5; letter-spacing: 1px;
        }

        /* Grid of Nodes */
        .nodes-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
            width: 100%; max-width: 1200px; z-index: 2; padding-bottom: 60px;
        }
        .node-card {
            background: var(--glass); border: 1px solid rgba(0, 243, 255, 0.25);
            padding: 20px 40px; min-width: 200px; cursor: pointer;
            transition: all 0.3s ease; position: relative; overflow: hidden;
            backdrop-filter: blur(8px); clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            text-decoration: none; color: #fff;
        }
        .node-card:hover {
            background: rgba(0, 243, 255, 0.15); border-color: var(--primary);
            transform: scale(1.05) translateY(-3px); 
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4);
        }
        .node-card h3 { font-size: 1.3rem; margin-bottom: 6px; letter-spacing: 1px; font-weight: 600; }
        .node-card span { font-size: 0.75rem; color: #888; font-family: monospace; text-transform: uppercase; }
        
        .loader { color: var(--primary); animation: blink 1s infinite; font-size: 1.1rem; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .hud-frame { display: none; }
            .container { padding: 30px 15px; justify-content: flex-start; padding-top: 60px; }
            h1 { margin-bottom: 10px; letter-spacing: 2px; }
            .slogan { font-size: 0.85rem; padding: 8px 15px; margin-bottom: 30px; width: 100%; }
            .node-card { width: 100%; padding: 15px 20px; min-width: auto; }
            .node-card h3 { font-size: 1.1rem; }
        }

        @keyframes pulse { 0% { text-shadow: 0 0 15px var(--primary); } 50% { text-shadow: 0 0 25px var(--primary), 0 0 50px var(--primary); } 100% { text-shadow: 0 0 15px var(--primary); } }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="container">
        <div class="hud-frame">
            <div class="hud-corner tl"></div><div class="hud-corner tr"></div>
            <div class="hud-corner bl"></div><div class="hud-corner br"></div>
        </div>

        <div style="margin-bottom: 10px; color: #555; font-size: 0.7rem; letter-spacing: 2px;">SYS:ONLINE // SHENZHEN_NODE</div>

        <h1>AI Code Mate</h1>
        <div class="slogan">致力于成为医疗领域最智能的 AI 编程伙伴</div>

        <div class="nodes-grid" id="nodes">
            <div class="loader">>> INITIALIZING NODES...</div>
        </div>
        
        <div class="status-bar">
            POWERED BY WANGCAI | SECURE CONNECTION
        </div>
    </div>

    <script>
        // 1. Particle Background
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        let particles = [];
        function initParticles() {
            particles = [];
            let count = w < 768 ? 40 : 80; // Fewer particles on mobile
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1
                });
            }
        }
        initParticles();

        function drawBg() {
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#00f3ff';
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.12)';
            
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > w) p.vx *= -1;
                if(p.y < 0 || p.y > h) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();

                // Connect lines
                for(let j=i+1; j<particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.lineWidth = 1 - dist/120;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawBg);
        }
        drawBg();

        // 2. Fetch Members & Format Name
        const OWNER = 'tophpc';
        const REPO = 'mate';
        const BASE = `https://github.com/${OWNER}/${REPO}/tree/main/members/`;

        function formatName(name) {
            // Convert "wangronghua" -> "Wangronghua" (Capitalize first letter)
            // If it contains underscores "wang_rong_hua" -> "WangRongHua"
            return name
                .split(/[_-]/)
                .map(part => part.charAt(0).toUpperCase() + part.slice(1))
                .join('');
        }

        fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/members`)
            .then(res => res.json())
            .then(data => {
                const nodesDiv = document.getElementById('nodes');
                nodesDiv.innerHTML = '';
                const folders = data.filter(i => i.type === 'dir' && !i.name.startsWith('.'));
                
                if(folders.length === 0) {
                    nodesDiv.innerHTML = '<div style="color:#888">NO NODES</div>';
                }

                folders.forEach(f => {
                    const card = document.createElement('a');
                    card.href = BASE + f.name;
                    card.className = 'node-card';
                    const displayName = formatName(f.name);
                    card.innerHTML = `<h3>${displayName}</h3><span>[ ACCESS ]</span>`;
                    nodesDiv.appendChild(card);
                });
            })
            .catch(e => {
                document.getElementById('nodes').innerHTML = `<div style="color:#ff4444; border:1px solid red; padding:20px;">ERR: ${e.message}</div>`;
            });
    </script>
</body>
</html>
